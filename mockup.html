<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SimpleGlance — Watch Face Preview</title>
<style>
  body { background:#111; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:-apple-system,sans-serif; gap:16px; }
  h3 { color:#555; margin:0; letter-spacing:2px; font-size:11px; text-transform:uppercase; }
  .controls { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  label { color:#888; font-size:11px; display:flex; align-items:center; gap:4px; }
  input[type=range] { width:80px; }
</style>
</head>
<body>
<h3>SimpleGlance — Garmin Fenix 6 Pro</h3>
<canvas id="c" width="520" height="520"></canvas>
<div class="controls">
  <label>Battery <input type="range" id="batt" min="0" max="100" value="72"> <span id="battVal">72%</span></label>
  <label>Notifs <input type="range" id="notif" min="0" max="20" value="3"> <span id="notifVal">3</span></label>
  <label><input type="checkbox" id="btConn" checked> BT</label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
// Scale: Fenix 6 = 260×260px, canvas = 520×520 (2×)
const S = 2;
const CX = 260, CY = 260, R = 260;

// Map watch-face coords (0..260) to canvas coords
function wx(x) { return x * S; }
function wy(y) { return y * S; }

let battPct = 72, notifCount = 3, btConnected = true;

document.getElementById('batt').addEventListener('input', e => {
  battPct = parseInt(e.target.value);
  document.getElementById('battVal').textContent = battPct + '%';
  draw();
});
document.getElementById('notif').addEventListener('input', e => {
  notifCount = parseInt(e.target.value);
  document.getElementById('notifVal').textContent = notifCount;
  draw();
});
document.getElementById('btConn').addEventListener('change', e => {
  btConnected = e.target.checked;
  draw();
});

function draw() {
  ctx.clearRect(0, 0, 520, 520);

  // ── Circular clip + background ─────────────────────────────────────────────
  ctx.save();
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.clip();
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, 520, 520);

  // ── Battery arc (top semicircle, radius ~246px on 520 canvas = 123 watch-px) ──
  // Garmin: 0°=3 o'clock, 90°=12 o'clock, CCW direction.
  // Canvas: 0°=3 o'clock, angles go CW. So Garmin 90° = Canvas -90° (=270° CCW).
  // Full arc: canvas from -180° to 0° (= Garmin 0° to 180° CCW through top).
  const r_arc = (260/2 - 7) * S;  // (screenWidth/2 - 7) * scale
  const endFrac = battPct / 100;
  const battCol = battPct < 10 ? '#ff2222' : battPct <= 50 ? '#ff8800' : '#00cc44';

  // Background (dim) track
  ctx.beginPath();
  ctx.arc(CX, CY, r_arc, Math.PI, 0, false);  // 180°→0° CCW on canvas = top semicircle
  ctx.strokeStyle = '#444'; ctx.lineWidth = 10; ctx.stroke();

  // Battery fill: starts at 180° (9 o'clock on canvas) and sweeps CW by endFrac*180°
  // Garmin 0°→endAngle CCW = Canvas startAngle 180° to (180° - endFrac*180°)
  if (battPct > 0) {
    const startA = Math.PI;            // 180° = 9 o'clock (canvas)
    const endA   = Math.PI - endFrac * Math.PI;  // sweeps CW toward 0° (3 o'clock)
    ctx.beginPath();
    ctx.arc(CX, CY, r_arc, startA, endA, false);
    ctx.strokeStyle = battCol; ctx.lineWidth = 10; ctx.stroke();
  }
  ctx.lineWidth = 1;

  // ── Date ──────────────────────────────────────────────────────────────────
  const now    = new Date();
  const days   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dateStr = `${days[now.getDay()]} ${String(now.getDate()).padStart(2,'0')} ${months[now.getMonth()]}`;
  ctx.font = `bold ${14*S}px -apple-system,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText(dateStr, wx(130), wy(38));

  // ── Time (two-tone) ────────────────────────────────────────────────────────
  let h = now.getHours() % 12 || 12;
  const hrStr  = String(h).padStart(2,'0');
  const minStr = String(now.getMinutes()).padStart(2,'0');
  const timeY  = wy(130);
  const fSize  = 90 * S;  // approximate DIN Condensed Bold at cap-height

  ctx.font = `900 ${fSize}px "DIN Condensed","Arial Narrow",sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';

  const hrW  = ctx.measureText(hrStr).width;
  const minW = ctx.measureText(minStr).width;
  const gap  = 12 * S;
  const totW = hrW + gap + minW;
  const hrX  = CX - totW / 2;
  const minX = hrX + hrW + gap;
  const colX = hrX + hrW + gap / 2;

  ctx.fillStyle = '#ffffff'; ctx.fillText(hrStr, hrX, timeY);
  ctx.fillStyle = '#ff8800'; ctx.fillText(minStr, minX, timeY);

  // Colon dots
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(colX, timeY - 20*S, 7*S, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(colX, timeY + 20*S, 7*S, 0, Math.PI*2); ctx.fill();

  // ── Left panel: bell | divider | BT ───────────────────────────────────────
  const lx = wx(20), ly = timeY;

  // Bell icon (~22px tall)
  const bcy = timeY - 28*S;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(lx, bcy - 3*S, 9*S, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.fillRect(lx - 10*S, bcy - 3*S, 20*S, 10*S);
  ctx.fillStyle = '#fff';
  ctx.fillRect(lx - 8*S, bcy - 3*S, 16*S, 8*S);
  ctx.fillRect(lx - 10*S, bcy + 5*S, 20*S, 3*S);
  ctx.beginPath(); ctx.arc(lx, bcy + 11*S, 3*S, 0, Math.PI*2); ctx.fill();

  // Divider
  ctx.strokeStyle = '#555'; ctx.lineWidth = S;
  ctx.beginPath(); ctx.moveTo(lx - 10*S, ly + 2*S); ctx.lineTo(lx + 10*S, ly + 2*S); ctx.stroke();

  // BT icon (~20px tall, 2px stroke)
  const btcy = timeY + 26*S;
  const btCol = btConnected ? '#4488ff' : '#555';
  ctx.strokeStyle = btCol; ctx.lineWidth = 2*S;
  ctx.beginPath(); ctx.moveTo(lx, btcy - 10*S); ctx.lineTo(lx, btcy + 10*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx, btcy - 10*S); ctx.lineTo(lx + 7*S, btcy - 5*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx + 7*S, btcy - 5*S); ctx.lineTo(lx, btcy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx, btcy); ctx.lineTo(lx + 7*S, btcy + 5*S); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx + 7*S, btcy + 5*S); ctx.lineTo(lx, btcy + 10*S); ctx.stroke();
  ctx.lineWidth = 1;

  // ── Right panel: notification count box ───────────────────────────────────
  const ncx  = wx(260 - 30);
  const ncy  = timeY;
  const boxW = 54 * S, boxH = 32 * S;
  const bx   = ncx - boxW / 2, by = ncy - boxH / 2;

  ctx.fillStyle = '#000';
  ctx.fillRect(bx, by, boxW, boxH);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2*S;
  ctx.strokeRect(bx, by, boxW, boxH);
  ctx.lineWidth = 1;

  ctx.fillStyle = '#fff';
  ctx.font = `bold ${14*S}px -apple-system,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(notifCount, ncx, ncy);

  // ── Bottom bar ─────────────────────────────────────────────────────────────
  ctx.fillStyle = '#fff';
  ctx.font = `${11*S}px -apple-system,sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('8.2k stp  •  7 fl', wx(130), wy(223));

  // ── Bezel ──────────────────────────────────────────────────────────────────
  ctx.restore();
  ctx.strokeStyle = '#282828'; ctx.lineWidth = 18;
  ctx.beginPath(); ctx.arc(CX, CY, R + 5, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle = '#444'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.stroke();
}

draw();
setInterval(draw, 10000);
</script>
</body>
</html>
